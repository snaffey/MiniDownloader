name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows-x64
            archive_name: MiniDownloader-Windows-x64.zip
          - os: macos-latest
            name: macOS-arm64
            archive_name: MiniDownloader-macOS-arm64.zip
          - os: ubuntu-latest
            name: Linux-x64
            archive_name: MiniDownloader-Linux-x64.tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libasound2-dev

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build executable with PyInstaller
        run: |
          pyinstaller MiniDownloader.spec --clean

      - name: Package build artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          Compress-Archive -Path dist/MiniDownloader -DestinationPath ${{ matrix.archive_name }}

      - name: Package build artifact (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist && zip -r ../${{ matrix.archive_name }} MiniDownloader/

      - name: Package build artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          cd dist && tar -czf ../${{ matrix.archive_name }} MiniDownloader/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-artifact
          path: ${{ matrix.archive_name }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
